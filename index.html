<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Mãe Yara - Amor Fraterno</title>
  <link rel="shortcut icon" href="favicon.png?v=2"/>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Carattere&display=swap" rel="stylesheet">

  <style>
    
    :root {
      --primary: #1dabaf;
      --primary-dark: #158c90;
      --danger: #d83a3a;
      --danger-dark: #b92f2f;
      --bg: #050505;
      --field-bg: rgba(0, 0, 0, 0.82);
      --text: #ffffff;
      --red: #ff2b2b;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
      --radius: 18px;
    }
.fonte{
  
  font-family: "Carattere", cursive;
  font-weight: 400;
  font-style: normal;
}
    * {


      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
        font-size: 62px;
    }

    html,
    body {

      min-height: 100%;
      margin: 0;
      padding: 0;

      background: var(--bg);
      color: var(--text);
    
    }

    body {
      min-height: 100svh;
      background-color: #189599;
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      min-height: 100svh;
      padding: max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: min(720px, 100%);
      min-height: auto;
      padding: clamp(20px, 5vw, 42px);
      border-radius: 28px;
      background: rgba(0, 0, 0, 0.42);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .title {
      margin: 0 0 22px;
      text-align: center;
      font-size: clamp(34px, 9vw, 64px);
      line-height: 1;
      color: #ffffff;
      text-shadow: 0 0 14px rgba(0, 0, 0, 0.95);
      font-weight: 800;
    }

    .subtitle {
      margin: 0 auto 22px;
      max-width: 520px;
      text-align: center;
   
      line-height: 1.45;
      color: #169195;
    }

    #editable {
      width: 100%;
      min-height: 58px;
      max-height: 130px;
      overflow-y: auto;
      outline: none;
      border: 1.5px solid rgba(255, 43, 43, 0.9);
      border-radius: var(--radius);
      background: var(--field-bg);
      color: var(--red);
      font-size: clamp(26px, 4.6vw, 25px);
      line-height: 1.35;
      padding: 16px 18px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      word-break: break-word;
      white-space: pre-wrap;
       cursor:text;
    }

    #editable:empty:before {
      content: attr(data-placeholder);
      color: rgba(255, 255, 255, 0.35);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 18px;
    }

    button {
      width: 100%;
      min-height: 52px;
      border: none;
      border-radius: 999px;
      padding: 14px 18px;
      font-size: clamp(26px, 3.6vw, 16px);
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #000;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.28);
      transition: transform 0.15s ease, filter 0.15s ease, background 0.15s ease;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.98);
    }

    #changeText {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    }

    #reseta {
      background: linear-gradient(135deg, var(--danger), var(--danger-dark));
    }

    #voltar {
      display: none;
      max-width: 260px;
      margin: 24px auto 0;
      background: #ffffff;
      color: #111111;
    }

    #resultado {
      display: none;
      width: 100%;
      min-height: 150px;
      padding: clamp(18px, 5vw, 32px);
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(29, 171, 175, 0.55);
      color: var(--primary);
      font-size: clamp(26px, 8vw, 48px);
      line-height: 1.15;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 3px 3px 4px black;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .footer-counter {
      position: fixed;
      left: max(10px, env(safe-area-inset-left));
      bottom: max(10px, env(safe-area-inset-bottom));
      opacity: 0.75;
      max-width: 110px;
      z-index: 2;
    }

    .footer-counter img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 560px) {
      body {
        background-attachment: scroll;
      }

      .page {
        align-items: flex-start;
        padding-top: clamp(28px, 12vh, 90px);
      }

      .card {
        padding: 20px 16px;
        border-radius: 22px;
        background: rgba(0, 0, 0, 0.36);
      }

      .subtitle {
        margin-bottom: 18px;
        font-size: 50px;
      }

      #editable {
        min-height: 60px;
        padding: 15px 14px;
      }

      .actions {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      button {
        min-height: 54px;
      }

      #resultado {
        min-height: 180px;
        display: none;
        align-items: center;
        justify-content: center;
      }

      .footer-counter {
        display: none;
      }
    }

    @media (max-width: 360px) {
      .page {
        padding-left: 10px;
        padding-right: 10px;
      }

      .card {
        padding-left: 12px;
        padding-right: 12px;
      }

      button {
        padding-left: 12px;
        padding-right: 12px;
      }
    }

    @media (orientation: landscape) and (max-height: 520px) {
      .page {
        align-items: flex-start;
        padding-top: 12px;
        padding-bottom: 12px;
      }

      .card {
        padding: 16px;
      }

      .title {
        font-size: 36px;
        margin-bottom: 10px;
      }

      .subtitle {
        display: none;
      }

      .actions {
        grid-template-columns: 1fr 1fr;
      }

      #resultado {
        min-height: 110px;
        font-size: 30px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">
     
      <h2 class="subtitle fonte"><span style="font-family:arial;">ia</span> Amor Fraterno</h2>

      <div id="areaPergunta">
        <div id="editable"
             contenteditable="true"
             inputmode="text"
             autocapitalize="sentences"
             autocomplete="off"
             autocorrect="off"
             spellcheck="false"
             data-placeholder="Digite aqui sua pergunta para a iA Amor Fraterno"></div>

        <div class="actions">
          <button tabindex="1" type="button" id="changeText">Saber a Resposta</button>
          <button tabindex="0" type="button" id="reseta">Limpar Tudo</button>
        </div>
      </div>

      <div id="areaResultado">
        <div id="resultado"></div>
        <button type="button" id="voltar">Voltar</button>
      </div>
    </section>
  </main>

  <div class="footer-counter">
    <img
      src="http://counter6.allfreecounter.com/private/webcontadores.php?c=edd136a29b8a81fb61a6275010dc0946"
      border="0"
      title="contador de visitas"
      alt="contador de visitas">
  </div>

  <script>
    $(function () {
      const fraseFalsa = "Querida ia da Amor Fraterno eu gostaria muito de saber se";

      let modoResposta = false;
      let respostaReal = "";
      let perguntaVisivel = "";
      let posicaoFrase = 0;
      let ultimoTextoProcessado = "";

      const editable = document.getElementById("editable");

      function focarNoFim() {
        editable.focus();

        const range = document.createRange();
        range.selectNodeContents(editable);
        range.collapse(false);

        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
      }

      function setTexto(texto) {
        editable.textContent = texto;
        ultimoTextoProcessado = texto;
        focarNoFim();
      }

      function proximoCaractereFalso() {
        if (posicaoFrase < fraseFalsa.length) {
          const char = fraseFalsa.charAt(posicaoFrase);
          posicaoFrase++;
          return char;
        }

        return " ";
      }

      function processarCaractere(char) {
        if (char === ";") {
          modoResposta = !modoResposta;

          if (modoResposta) {
            posicaoFrase = 0;
          }

          return;
        }

        if (modoResposta) {
          respostaReal += char;
          perguntaVisivel += proximoCaractereFalso();
          return;
        }

        perguntaVisivel += char;
      }

      function apagarUltimoCaractere() {
        if (modoResposta) {
          respostaReal = respostaReal.slice(0, -1);
          perguntaVisivel = perguntaVisivel.slice(0, -1);

          if (posicaoFrase > 0) {
            posicaoFrase--;
          }

          return;
        }

        perguntaVisivel = perguntaVisivel.slice(0, -1);
      }

      editable.addEventListener("beforeinput", function (event) {
        const tipo = event.inputType;
        const data = event.data;

        if (tipo === "insertLineBreak" || tipo === "insertParagraph") {
          event.preventDefault();
          mostrarResposta(false);
          return;
        }

        if (tipo === "deleteContentBackward") {
          event.preventDefault();
          apagarUltimoCaractere();
          setTexto(perguntaVisivel);
          return;
        }

        if (tipo === "insertText" && data) {
          event.preventDefault();

          for (const char of data) {
            processarCaractere(char);
          }

          setTexto(perguntaVisivel);
        }
      });

      editable.addEventListener("input", function () {
        const textoAtual = editable.textContent || "";

        if (textoAtual === ultimoTextoProcessado) {
          return;
        }

        if (textoAtual.length < ultimoTextoProcessado.length) {
          apagarUltimoCaractere();
          setTexto(perguntaVisivel);
          return;
        }

        const inserido = textoAtual.slice(ultimoTextoProcessado.length);

        for (const char of inserido) {
          processarCaractere(char);
        }

        setTexto(perguntaVisivel);
      });

      function mostrarResposta(falar) {
        $("#areaPergunta").hide();
        $("#resultado").css("display", "flex");
        $("#voltar").show();

        const respostaLimpa = respostaReal.trim();

        if (respostaLimpa) {
          $("#resultado").text(respostaLimpa);

          if (falar && window.responsiveVoice) {
            responsiveVoice.speak(respostaLimpa, "Brazilian Portuguese Female");
          }
        } else {
          const aviso = "Você precisa saber perguntar";
          $("#resultado").text(aviso);

          if (falar && window.responsiveVoice) {
            responsiveVoice.speak(aviso, "Brazilian Portuguese Female");
          }
        }
      }

      function limparTudo() {
        modoResposta = false;
        respostaReal = "";
        perguntaVisivel = "";
        posicaoFrase = 0;
        setTexto("");
      }

      $("#changeText").on("click", function () {
        mostrarResposta(true);
      });

      $("#reseta").on("click", function () {
        limparTudo();
      });

      $("#voltar").on("click", function () {
        $("#areaPergunta").show();
        $("#resultado").hide();
        $("#voltar").hide();

        limparTudo();
      });

      editable.addEventListener("click", focarNoFim);
      editable.addEventListener("focus", focarNoFim);
    });
  </script>
</body>
</html>
